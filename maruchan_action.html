<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>まるちゃんアクション - まるちゃんワールド</title>
<style>
  body {
    margin: 0; background: #080818;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; font-family: sans-serif;
    overflow: hidden; user-select: none;
  }
  canvas { border: 3px solid #ff69b4; border-radius: 10px; box-shadow: 0 0 30px rgba(255,105,180,0.4); }
  #controls { color: #555; margin-top: 8px; font-size: 12px; }
</style>
</head>
<body>
<canvas id="game" width="800" height="450"></canvas>
<div id="controls">← → 移動 ｜ ↑ / W ジャンプ（2段） ｜ Z / Space フワフワ飛ぶ ｜ X 吸い込む / 能力発射</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 450, FLOOR = 378;
const GRAVITY = 0.38;
const GAME_TIME = 90; // 1クール秒数

// ── BGM ───────────────────────────────────────────────────
let audioCtx = null;
let bgmOn = true, bgmIdx = 0, bassIdx = 0, bgmNext = 0, bassNext = 0;

const BPM = 148, N = 60/BPM/2;
const F = {
  C3:131,D3:147,E3:165,F3:175,G3:196,A3:220,B3:247,
  C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,
  C5:523,D5:587,E5:659,F5:698,G5:784,A5:880,B5:988,C6:1047,R:0,
};
const MELODY=[
  [F.C5,2],[F.E5,2],[F.G5,2],[F.E5,2],[F.C5,4],[F.D5,2],[F.E5,2],
  [F.F5,2],[F.E5,2],[F.D5,2],[F.C5,2],[F.G4,4],[F.R,4],
  [F.E5,2],[F.G5,2],[F.C6,2],[F.G5,2],[F.E5,4],[F.D5,2],[F.C5,2],
  [F.A4,2],[F.C5,2],[F.E5,2],[F.G5,2],[F.C5,8],
];
const BASS=[
  [F.C3,4],[F.G3,4],[F.C3,4],[F.G3,4],
  [F.F3,4],[F.C3,4],[F.F3,4],[F.C3,4],
  [F.A3,4],[F.E3,4],[F.A3,4],[F.E3,4],
  [F.G3,4],[F.D3,4],[F.G3,4],[F.D3,4],
];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  bgmNext = audioCtx.currentTime + 0.05;
  bassNext = audioCtx.currentTime + 0.05;
}

function playNote(freq, start, dur, type, vol) {
  if (!audioCtx || freq===0) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, start);
  gain.gain.exponentialRampToValueAtTime(0.0001, start+dur*0.85);
  osc.start(start); osc.stop(start+dur);
}

function scheduleBGM() {
  if (!audioCtx || !bgmOn) return;
  const ahead = 0.2;
  while (bgmNext < audioCtx.currentTime+ahead) {
    const [freq,len] = MELODY[bgmIdx%MELODY.length];
    playNote(freq, bgmNext, N*len*0.88, 'square', 0.055);
    bgmNext += N*len; bgmIdx++;
  }
  while (bassNext < audioCtx.currentTime+ahead) {
    const [freq,len] = BASS[bassIdx%BASS.length];
    playNote(freq, bassNext, N*len*0.7, 'triangle', 0.08);
    bassNext += N*len; bassIdx++;
  }
}

function sfx(type) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  if (type==='jump')    { playNote(523,t,0.06,'square',0.07); playNote(659,t+0.05,0.06,'square',0.06); }
  if (type==='inhale')  { playNote(330,t,0.04,'square',0.05); playNote(262,t+0.04,0.04,'square',0.04); }
  if (type==='copy')    { playNote(784,t,0.07,'square',0.09); playNote(988,t+0.07,0.07,'square',0.09); playNote(1175,t+0.14,0.12,'square',0.1); }
  if (type==='fire')    { playNote(523,t,0.05,'square',0.08); playNote(880,t+0.04,0.1,'sawtooth',0.07); }
  if (type==='defeat')  { playNote(659,t,0.06,'square',0.08); playNote(784,t+0.06,0.06,'square',0.08); playNote(1047,t+0.12,0.12,'square',0.09); }
  if (type==='hit')     { playNote(180,t,0.08,'sawtooth',0.1); playNote(110,t+0.07,0.1,'sawtooth',0.08); }
  if (type==='end')     { playNote(523,t,0.15,'square',0.09); playNote(659,t+0.15,0.15,'square',0.09); playNote(784,t+0.30,0.15,'square',0.09); playNote(1047,t+0.45,0.3,'square',0.1); }
}

// ── State ────────────────────────────────────────────────
let mode = 'title'; // title | play | ending | result
let gameMode = 'score'; // 'score' | 'survival'
let score = 0, defeated = 0, spawnTimer = 0, frame = 0, missFlash = 0;
// サバイバル用
let lives = 5;
const MAX_LIVES = 5;
let heartAnim = [0,0,0,0,0];
let wave = 1, waveAnnounce = 0; // wave表示カウント
let survivalSec = 0; // 生存秒数

// ── Player ───────────────────────────────────────────────
function resetPlayer() {
  player.x=100; player.y=300; player.vx=0; player.vy=0;
  player.onGround=false; player.floating=false; player.floatTimer=0;
  player.inhaling=false; player.puffed=false; player.ability=null;
  player.facing=1; player.jumpCount=0; player.invincible=0; player.atkAnim=0;
}
const player = {
  x:100, y:300, w:36, h:36, vx:0, vy:0,
  onGround:false, floating:false, floatTimer:0, maxFloat:130,
  inhaling:false, puffed:false, ability:null,
  facing:1, jumpCount:0, invincible:0, atkAnim:0,
};

// ── Platforms ────────────────────────────────────────────
const platforms = [
  { x:0,   y:FLOOR, w:800, h:72 },
  { x:130, y:290,   w:110, h:14 },
  { x:340, y:230,   w:100, h:14 },
  { x:540, y:265,   w:120, h:14 },
  { x:650, y:165,   w:110, h:14 },
  { x:40,  y:175,   w:90,  h:14 },
  { x:260, y:145,   w:80,  h:14 },
];

// ── Enemies ───────────────────────────────────────────────
const ETYPES = {
  waddle: { color:'#FF8C00', ability:null,    w:28, h:26, spd:0.8 },
  hothead:{ color:'#FF4500', ability:'fire',  w:30, h:30, spd:0.6 },
  chilly: { color:'#77CCEE', ability:'ice',   w:28, h:30, spd:0.5 },
  spark:  { color:'#FFD700', ability:'spark', w:26, h:26, spd:1.1 },
};

function abilityColor(ab) {
  if (ab==='fire')  return '#FF6633';
  if (ab==='ice')   return '#88DDFF';
  if (ab==='spark') return '#FFEE00';
  return '#ffffff';
}
function abilityName(ab) {
  if (ab==='fire')  return '🔥 ファイア';
  if (ab==='ice')   return '❄️ アイス';
  if (ab==='spark') return '⚡ スパーク';
  return '';
}

let enemies=[], projectiles=[], particles=[], floats=[];
let stars=[];
for (let i=0;i<60;i++)
  stars.push({ x:Math.random()*W, y:Math.random()*H*0.8, r:Math.random()*1.8+0.4, t:Math.random()*Math.PI*2 });

// ── Input ─────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;

  if (mode==='title') {
    initAudio();
    if (e.key==='1') startGame('score');
    if (e.key==='2') startGame('survival');
    if (e.key===' '||e.key==='Enter') startGame('score');
    if (e.key==='m'||e.key==='M') bgmOn=!bgmOn;
    e.preventDefault(); return;
  }
  if (mode==='result') {
    if (e.key===' '||e.key==='Enter'||e.key==='Escape') mode='title';
    e.preventDefault(); return;
  }
  if (e.key==='Escape') { mode='title'; e.preventDefault(); return; }

  if (e.code==='ArrowUp'||e.code==='KeyW') {
    if (player.onGround||player.jumpCount<2) {
      player.vy=-9.2; player.jumpCount++;
      player.floating=false; player.floatTimer=0;
      addParticles(player.x+player.w/2, player.y+player.h, '#ffffff', 5, 0, -1);
      sfx('jump');
    }
  }
  if (e.code==='KeyX') {
    if (player.ability) fireAbility();
    else { player.inhaling=true; player.puffed=true; sfx('inhale'); }
  }
  e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.code]=false;
  if (e.code==='KeyX') { player.inhaling=false; player.puffed=false; }
});

// ── Game control ─────────────────────────────────────────
function startGame(gm='score') {
  gameMode = gm;
  resetPlayer();
  enemies=[]; projectiles=[]; particles=[]; floats=[];
  score=0; defeated=0; spawnTimer=0; frame=0; missFlash=0;
  lives=MAX_LIVES; heartAnim=[0,0,0,0,0];
  wave=1; waveAnnounce=0; survivalSec=0;
  bgmIdx=0; bassIdx=0;
  if (audioCtx) { bgmNext=audioCtx.currentTime+0.1; bassNext=audioCtx.currentTime+0.1; }
  spawnEnemy(); spawnEnemy();
  mode='play';
}

// ── Helpers ───────────────────────────────────────────────
function addParticles(x,y,color,n=12,bvx=0,bvy=-2) {
  for (let i=0;i<n;i++) {
    particles.push({
      x, y,
      vx:(Math.random()-0.5)*5+bvx,
      vy:(Math.random()-0.5)*5+bvy,
      life:20+Math.random()*15, max:35,
      color, r:2+Math.random()*3,
    });
  }
}

function addFloat(x,y,text,color) {
  floats.push({ x, y, text, color, life:55, max:55 });
}

function hitTest(a,b) {
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function fireAbility() {
  const ab=player.ability;
  player.ability=null;
  const px=player.facing>0?player.x+player.w+4:player.x-4;
  projectiles.push({ x:px, y:player.y+player.h/2, vx:player.facing*9, vy:0, ability:ab, alive:true });
  addParticles(px, player.y+player.h/2, abilityColor(ab), 10, player.facing*3, 0);
  player.atkAnim=10;
  sfx('fire');
}

function spawnEnemy() {
  const types=Object.keys(ETYPES);
  const type=types[Math.floor(Math.random()*types.length)];
  const d=ETYPES[type];
  const fromLeft=Math.random()<0.5;
  const spdMult = gameMode==='survival' ? 1+0.3*(wave-1) : 1;
  enemies.push({
    x:fromLeft?-50:W+50, y:FLOOR-d.h,
    w:d.w, h:d.h, vx:(fromLeft?1:-1)*d.spd*spdMult,
    type, ability:d.ability, color:d.color,
    alive:true, inhaled:false, inhaledProg:0, walk:0,
  });
}

// ── Physics ───────────────────────────────────────────────
function resolvePlatforms() {
  player.onGround=false;
  for (const p of platforms) {
    if (player.x+player.w<=p.x||player.x>=p.x+p.w) continue;
    if (player.vy>=0&&player.y+player.h>=p.y&&player.y+player.h<=p.y+p.h+12) {
      player.y=p.y-player.h; player.vy=0;
      player.onGround=true; player.jumpCount=0;
      player.floating=false; player.floatTimer=0;
    } else if (player.vy<0&&player.y<=p.y+p.h&&player.y>=p.y) {
      player.y=p.y+p.h; player.vy=0;
    }
  }
}

// ── Update ────────────────────────────────────────────────
function update() {
  frame++;
  for (const s of stars) s.t+=0.035;
  scheduleBGM();
  if (mode!=='play') return;

  // ── モード別タイマー/ウェーブ処理 ──
  if (gameMode==='score') {
    const timeLeft = GAME_TIME - Math.floor(frame/60);
    if (timeLeft<=0) { sfx('end'); mode='ending'; setTimeout(()=>{ mode='result'; },300); return; }
    if (timeLeft<=10 && frame%30===0) missFlash=4;
  } else {
    // サバイバル：ウェーブアップ（20秒ごと）
    survivalSec = Math.floor(frame/60);
    const newWave = 1 + Math.floor(survivalSec/20);
    if (newWave > wave) {
      wave = newWave;
      waveAnnounce = 150;
      sfx('copy'); // ウェーブアップ音
    }
    if (waveAnnounce>0) waveAnnounce--;
  }

  // 移動
  if (keys['ArrowLeft']||keys['KeyA']) { player.vx=-3.8; player.facing=-1; }
  else if (keys['ArrowRight']||keys['KeyD']) { player.vx=3.8; player.facing=1; }
  else { player.vx*=0.8; }

  // フワフワ
  if ((keys['Space']||keys['KeyZ'])&&!player.onGround&&player.floatTimer<player.maxFloat) {
    player.floating=true;
    player.vy=player.vy<0?player.vy*0.9:-0.8;
    player.floatTimer++;
    if (frame%8===0) addParticles(player.x+player.w/2, player.y+player.h, '#ffaaee', 2, 0, 1);
  } else { player.floating=false; }

  if (!player.floating) player.vy+=GRAVITY;
  player.vy=Math.min(player.vy,16);
  player.x+=player.vx; player.y+=player.vy;
  if (player.x>W) player.x=-player.w;
  if (player.x+player.w<0) player.x=W;
  if (player.y>H+50) { player.y=50; player.vy=0; }
  resolvePlatforms();
  if (player.invincible>0) player.invincible--;
  if (player.atkAnim>0)    player.atkAnim--;

  // 吸い込み
  if (player.inhaling) {
    const iRect={
      x:player.facing>0?player.x+player.w:player.x-90,
      y:player.y-15, w:90, h:player.h+30,
    };
    for (const e of enemies) {
      if (e.alive&&!e.inhaled&&hitTest(e,iRect)) e.inhaled=true;
    }
  }

  // 吸い込み引き寄せ
  for (const e of enemies) {
    if (!e.inhaled) continue;
    e.inhaledProg+=0.1;
    e.x+=(player.x+player.w/2-e.x)*0.18;
    e.y+=(player.y+player.h/2-e.y)*0.18;
    if (e.inhaledProg>=1) {
      if (e.ability&&!player.ability) {
        player.ability=e.ability;
        addParticles(player.x+player.w/2, player.y, abilityColor(e.ability), 15, 0, -3);
        sfx('copy');
      }
      score+=100; defeated++;
      addFloat(e.x+e.w/2, e.y-10, '+100', '#ffffff');
      e.alive=false;
    }
  }

  // 敵AI
  for (const e of enemies) {
    if (!e.alive||e.inhaled) continue;
    e.walk++; e.x+=e.vx;
    if (e.x<-60||e.x>W+60) e.vx*=-1;
    e.y=FLOOR-e.h;
    if (player.invincible===0&&hitTest(player,e)) {
      player.invincible=80; player.vy=-6; player.ability=null;
      missFlash=15;
      addParticles(player.x+player.w/2, player.y+player.h/2, '#ff6699', 8, 0, -2);
      addFloat(player.x, player.y-30, 'ダメージ！', '#ff4466');
      sfx('hit');
      if (gameMode==='survival') {
        lives--;
        heartAnim[lives] = 20;
        if (lives<=0) {
          sfx('end');
          setTimeout(()=>{ mode='result'; }, 500);
          mode='ending';
        }
      }
    }
  }

  // 弾
  for (const proj of projectiles) {
    if (!proj.alive) continue;
    proj.x+=proj.vx; proj.y+=proj.vy;
    if (proj.x<-30||proj.x>W+30||proj.y<-30||proj.y>H+30) { proj.alive=false; continue; }
    for (const e of enemies) {
      if (!e.alive||e.inhaled) continue;
      if (proj.x>e.x&&proj.x<e.x+e.w&&proj.y>e.y&&proj.y<e.y+e.h) {
        proj.alive=false; e.alive=false; score+=200; defeated++;
        addParticles(e.x+e.w/2, e.y+e.h/2, abilityColor(proj.ability), 14, 0, -2);
        addFloat(e.x+e.w/2, e.y-10, '+200', abilityColor(proj.ability));
        sfx('defeat');
        break;
      }
    }
  }

  for (const p of particles) { p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life--; }
  for (const f of floats)    { f.y-=0.9; f.life--; }
  enemies     = enemies.filter(e=>e.alive);
  projectiles = projectiles.filter(p=>p.alive);
  particles   = particles.filter(p=>p.life>0);
  floats      = floats.filter(f=>f.life>0);
  if (missFlash>0) missFlash--;
  heartAnim = heartAnim.map(v=>Math.max(0,v-1));

  spawnTimer++;
  const spawnInterval = gameMode==='survival' ? Math.max(60, 180-wave*20) : 180;
  const maxEnemies    = gameMode==='survival' ? Math.min(3+wave, 10)       : 6;
  if (spawnTimer>spawnInterval&&enemies.length<maxEnemies) { spawnEnemy(); spawnTimer=0; }
}

// ── Draw ──────────────────────────────────────────────────
function drawBg() {
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#060614'); g.addColorStop(1,'#121244');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for (const s of stars) {
    ctx.fillStyle=`rgba(255,255,255,${0.3+0.7*Math.abs(Math.sin(s.t))})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  [[150,75,70,28],[490,55,90,32],[710,95,55,22]].forEach(([cx,cy,rw,rh])=>{
    ctx.fillStyle='rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.ellipse(cx,cy,rw,rh,0,0,Math.PI*2); ctx.fill();
  });
  if (missFlash>0) {
    ctx.fillStyle=`rgba(255,0,60,${missFlash/15*0.2})`; ctx.fillRect(0,0,W,H);
  }
}

function drawPlatforms() {
  for (const p of platforms) {
    const g=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
    if (p.h>30) {
      g.addColorStop(0,'#4e8a5a'); g.addColorStop(0.15,'#3a6644');
      g.addColorStop(0.16,'#2d4a30'); g.addColorStop(1,'#1a2e1c');
    } else {
      g.addColorStop(0,'#6ab24e'); g.addColorStop(1,'#3d7a4a');
    }
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,p.h,p.h>30?0:7); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(p.x,p.y,p.w,3);
  }
}

function drawPlayer() {
  const cx=player.x+player.w/2, cy=player.y+player.h/2;
  const rx=player.w/2*(player.puffed?1.28:1);
  const ry=player.h/2*(player.puffed?1.18:1);
  const hurt=player.invincible>0&&Math.floor(player.invincible/6)%2===1;
  if (hurt) ctx.globalAlpha=0.45;

  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(cx,FLOOR+4,rx*0.75,5,0,0,Math.PI*2); ctx.fill();
  const bodyColor=player.ability?abilityColor(player.ability):'#FF69B4';
  ctx.fillStyle=bodyColor;
  ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.ellipse(cx-rx*0.2,cy-ry*0.3,rx*0.45,ry*0.3,-0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,80,120,0.45)';
  ctx.beginPath(); ctx.ellipse(cx-rx*0.48,cy+ry*0.12,rx*0.2,ry*0.16,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+rx*0.48,cy+ry*0.12,rx*0.2,ry*0.16,0,0,Math.PI*2); ctx.fill();
  const eo=player.facing*rx*0.12;
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(cx-rx*0.26+eo,cy-ry*0.06,rx*0.1,ry*0.14,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+rx*0.26+eo,cy-ry*0.06,rx*0.1,ry*0.14,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(cx-rx*0.22+eo,cy-ry*0.11,rx*0.04,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+rx*0.30+eo,cy-ry*0.11,rx*0.04,0,Math.PI*2); ctx.fill();
  const step=Math.sin(frame*0.15)*2;
  ctx.fillStyle='#cc2266';
  ctx.beginPath(); ctx.ellipse(cx-rx*0.42,player.y+player.h*0.9+step,rx*0.2,ry*0.14,-0.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+rx*0.42,player.y+player.h*0.9-step,rx*0.2,ry*0.14, 0.2,0,Math.PI*2); ctx.fill();
  const arm=Math.sin(frame*0.2)*0.4;
  ctx.fillStyle=bodyColor;
  ctx.beginPath(); ctx.ellipse(cx-rx*0.82,cy+ry*0.1+arm*8,rx*0.24,ry*0.2,-0.5+arm,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+rx*0.82,cy+ry*0.1-arm*8,rx*0.24,ry*0.2, 0.5-arm,0,Math.PI*2); ctx.fill();

  if (player.inhaling) {
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
    for (let i=1;i<=4;i++) {
      const d=i*20;
      const bx=player.facing>0?cx+rx+d*0.4:cx-rx-d*0.4;
      ctx.beginPath();
      ctx.arc(bx,cy,d*0.35,
        player.facing>0?-Math.PI*0.55:Math.PI*0.45,
        player.facing>0? Math.PI*0.55:Math.PI*1.55);
      ctx.stroke();
    }
  }
  if (player.floating) {
    ctx.fillStyle='rgba(255,200,255,0.1)';
    ctx.beginPath(); ctx.ellipse(cx,cy,rx*1.6,ry*1.6,0,0,Math.PI*2); ctx.fill();
  }
  if (player.atkAnim>0) {
    const a=player.atkAnim/10;
    ctx.strokeStyle=`rgba(255,255,100,${a})`; ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(cx+player.facing*(rx+5),cy);
    ctx.lineTo(cx+player.facing*(rx+5+a*110),cy);
    ctx.stroke();
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=12;
    ctx.fillStyle=`rgba(255,220,0,${a})`;
    ctx.beginPath(); ctx.arc(cx+player.facing*(rx+5+a*110),cy,7,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
}

function drawEnemy(e) {
  const cx=e.x+e.w/2, cy=e.y+e.h/2;
  const bob=Math.sin(e.walk*0.18)*2.5;
  const alpha=e.inhaled?1-e.inhaledProg:1;
  ctx.globalAlpha=alpha;
  const fd=e.vx>0?0.08:-0.08;

  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(cx,FLOOR+3,12,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=e.color;
  ctx.beginPath(); ctx.ellipse(cx,cy+bob,e.w/2,e.h/2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.ellipse(cx-e.w*0.2+fd*e.w,cy-e.h*0.05+bob,e.w*0.1,e.h*0.13,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+e.w*0.2+fd*e.w,cy-e.h*0.05+bob,e.w*0.1,e.h*0.13,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(cx-e.w*0.14+fd*e.w,cy-e.h*0.1+bob,e.w*0.04,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+e.w*0.24+fd*e.w,cy-e.h*0.1+bob,e.w*0.04,0,Math.PI*2); ctx.fill();
  const step=Math.sin(e.walk*0.22)*4;
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(cx-e.w*0.3,e.y+e.h-2+step,e.w*0.17,e.h*0.11,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+e.w*0.3,e.y+e.h-2-step,e.w*0.17,e.h*0.11,0,0,Math.PI*2); ctx.fill();

  if (e.type==='hothead') {
    ctx.fillStyle='#FF6600';
    [-3,0,3].forEach((ox,i)=>{ ctx.beginPath(); ctx.arc(cx+ox,e.y-e.h/2-4+bob+Math.sin(frame*0.1+i)*2,4,0,Math.PI*2); ctx.fill(); });
  } else if (e.type==='chilly') {
    ctx.fillStyle='#C0EEFF'; ctx.beginPath(); ctx.roundRect(cx-9,e.y-e.h/2-8+bob,18,9,3); ctx.fill();
    ctx.fillStyle='white'; [-5,0,5].forEach(ox=>ctx.fillRect(cx+ox,e.y-e.h/2-7+bob,2,5));
  } else if (e.type==='spark') {
    ctx.strokeStyle=`rgba(255,220,0,${0.4+0.4*Math.sin(frame*0.15)})`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy+bob,e.w/2+5,0,Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function drawProjectile(proj) {
  const c=abilityColor(proj.ability);
  ctx.shadowColor=c; ctx.shadowBlur=15; ctx.fillStyle=c;
  if (proj.ability==='fire') {
    ctx.beginPath(); ctx.ellipse(proj.x,proj.y,13,8,Math.atan2(proj.vy,proj.vx),0,Math.PI*2); ctx.fill();
  } else if (proj.ability==='ice') {
    ctx.save(); ctx.translate(proj.x,proj.y); ctx.rotate(frame*0.08);
    for (let i=0;i<6;i++) { ctx.rotate(Math.PI/3); ctx.fillRect(-2,-10,4,20); }
    ctx.restore();
  } else {
    for (let i=0;i<5;i++) {
      const a=(i/5)*Math.PI*2+frame*0.15;
      ctx.beginPath(); ctx.arc(proj.x+Math.cos(a)*5,proj.y+Math.sin(a)*5,5,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.fill(); ctx.shadowBlur=0;
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha=p.life/p.max;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(p.life/p.max),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawFloats() {
  ctx.textAlign='center';
  for (const f of floats) {
    ctx.globalAlpha=f.life/f.max;
    ctx.font='bold 14px sans-serif';
    ctx.fillStyle=f.color; ctx.shadowColor=f.color; ctx.shadowBlur=8;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.textAlign='left';
}

function drawHUD() {
  // スコア
  ctx.font='bold 20px sans-serif'; ctx.fillStyle='#fff';
  ctx.shadowColor='#ff69b4'; ctx.shadowBlur=8;
  ctx.fillText(`★ ${score}`, 16, 34);
  ctx.shadowBlur=0;

  // 能力
  if (player.ability) {
    const c=abilityColor(player.ability);
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.roundRect(10,44,136,26,7); ctx.fill();
    ctx.font='15px sans-serif'; ctx.fillStyle=c;
    ctx.shadowColor=c; ctx.shadowBlur=10;
    ctx.fillText(abilityName(player.ability),18,62);
    ctx.shadowBlur=0;
  }

  if (gameMode==='score') {
    // タイマー
    const timeLeft=Math.max(0, GAME_TIME-Math.floor(frame/60));
    const tc=timeLeft<=10?'#ff6677':timeLeft<=30?'#FFD700':'#ffffff';
    ctx.font='bold 22px sans-serif'; ctx.fillStyle=tc;
    ctx.textAlign='center';
    ctx.shadowColor=tc; ctx.shadowBlur=timeLeft<=10?12:0;
    ctx.fillText(`⏱ ${timeLeft}`, W/2, 30);
    ctx.shadowBlur=0; ctx.textAlign='left';
  } else {
    // サバイバル：ライフ表示
    for (let i=0;i<MAX_LIVES;i++) {
      const shake=heartAnim[i]>0?Math.sin(heartAnim[i]*1.5)*3:0;
      ctx.font='22px sans-serif';
      ctx.globalAlpha=i<lives?1:0.2;
      ctx.fillText('♥', W/2-MAX_LIVES*14+i*28+shake, 30);
    }
    ctx.globalAlpha=1;
    // ウェーブ表示
    ctx.font='bold 14px sans-serif'; ctx.fillStyle='#FFD700';
    ctx.textAlign='center';
    ctx.fillText(`WAVE ${wave}`, W/2, 50);
    ctx.textAlign='left';
    // 生存時間
    const m=Math.floor(survivalSec/60), s=survivalSec%60;
    ctx.font='13px sans-serif'; ctx.fillStyle='#888';
    ctx.textAlign='right';
    ctx.fillText(`${m}:${String(s).padStart(2,'0')}`, W-16, 50);
    ctx.textAlign='left';

    // ウェーブアップ演出
    if (waveAnnounce>0) {
      const a=Math.min(waveAnnounce,30)/30;
      ctx.globalAlpha=a;
      ctx.font='bold 36px sans-serif'; ctx.fillStyle='#FFD700';
      ctx.shadowColor='#FFD700'; ctx.shadowBlur=20;
      ctx.textAlign='center';
      ctx.fillText(`WAVE ${wave} !!`, W/2, H/2-20);
      ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.textAlign='left';
    }
  }

  // 倒した数（共通）
  ctx.font='14px sans-serif'; ctx.fillStyle='#aaa';
  ctx.textAlign='right';
  ctx.fillText(`${defeated} 体倒した`, W-16, 30);
  ctx.textAlign='left';
}

// メニューボタン
const MENU_BTN = { x:W-90, y:H-38, w:80, h:26 };
canvas.addEventListener('click', e=>{
  if (mode!=='play') return;
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width);
  const my=(e.clientY-r.top)*(H/r.height);
  if (mx>=MENU_BTN.x&&mx<=MENU_BTN.x+MENU_BTN.w&&my>=MENU_BTN.y&&my<=MENU_BTN.y+MENU_BTN.h)
    mode='title';
});
function drawMenuButton() {
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(MENU_BTN.x,MENU_BTN.y,MENU_BTN.w,MENU_BTN.h,6); ctx.fill(); ctx.stroke();
  ctx.font='13px sans-serif'; ctx.fillStyle='#aaa';
  ctx.textAlign='center';
  ctx.fillText('← メニュー', MENU_BTN.x+MENU_BTN.w/2, MENU_BTN.y+17);
  ctx.textAlign='left';
}

function drawTitle() {
  drawBg(); drawPlatforms();
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 40px sans-serif';
  ctx.fillStyle='#FF69B4'; ctx.shadowColor='#ff69b4'; ctx.shadowBlur=20;
  ctx.fillText('まるちゃんアクション', W/2, 105);
  ctx.shadowBlur=0;
  ctx.font='14px sans-serif'; ctx.fillStyle='#666';
  ctx.fillText('吸い込んで能力コピー！モードを選んでね', W/2, 138);

  const modes=[
    { key:'１', label:'スコアアタック', sub:'90秒で高スコアを狙え！', color:'#FF69B4', glow:'rgba(255,105,180,0.3)', gm:'score'  },
    { key:'２', label:'サバイバル',     sub:'ライフ5個・波が来るたびに敵が増えて速くなる！', color:'#FFD700', glow:'rgba(255,215,0,0.3)',    gm:'survival'},
  ];
  modes.forEach((m,i)=>{
    const bx=W/2-170, by=168+i*98, bw=340, bh=78;
    const hov=Math.sin(frame*0.06+i)*2;
    ctx.fillStyle=`rgba(255,255,255,0.05)`;
    ctx.strokeStyle=m.color+'88'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(bx,by+hov,bw,bh,12); ctx.fill(); ctx.stroke();
    ctx.font='bold 11px sans-serif'; ctx.fillStyle=m.color;
    ctx.fillText(`キー ${m.key}`, bx+28, by+hov+22);
    ctx.font='bold 20px sans-serif'; ctx.fillStyle=m.color;
    ctx.shadowColor=m.color; ctx.shadowBlur=10;
    ctx.fillText(m.label, W/2+10, by+hov+32);
    ctx.shadowBlur=0;
    ctx.font='13px sans-serif'; ctx.fillStyle='#888';
    ctx.fillText(m.sub, W/2, by+hov+56);
  });

  ctx.font='12px sans-serif'; ctx.fillStyle='#444';
  ctx.fillText('← → 移動  ↑/W ジャンプ  Z/Space フワフワ  X 吸い込む・発射  M BGM切替', W/2, 386);

  // ミニキャラ
  const px=W/2-140, py=220;
  ctx.fillStyle='#FF69B4'; ctx.beginPath(); ctx.arc(px,py,14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath(); ctx.ellipse(px-4,py-5,6,4,-0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(px-5,py,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(px+5,py,2,0,Math.PI*2); ctx.fill();
  ctx.textAlign='left';
}

function drawResult() {
  drawBg();
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';

  if (gameMode==='score') {
    ctx.font='bold 36px sans-serif'; ctx.fillStyle='#FFD700';
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=15;
    ctx.fillText('タイム終了！', W/2, 95);
    ctx.shadowBlur=0;
    const rows=[['スコア',`${score} 点`,'#ff99cc'],['倒した数',`${defeated} 体`,'#88ccff']];
    rows.forEach(([label,val,color],i)=>{
      ctx.font='17px sans-serif'; ctx.fillStyle='#888';
      ctx.fillText(label, W/2-50, 168+i*55);
      ctx.font=`bold ${i===0?32:26}px sans-serif`; ctx.fillStyle=color;
      ctx.shadowColor=color; ctx.shadowBlur=10;
      ctx.fillText(val, W/2+50, 168+i*55);
      ctx.shadowBlur=0;
    });
    const rank=score>=3000?'S':score>=2000?'A':score>=1000?'B':score>=500?'C':'D';
    const rc=rank==='S'?'#FFD700':rank==='A'?'#ff99cc':rank==='B'?'#88ccff':rank==='C'?'#66ffaa':'#aaa';
    ctx.font='bold 64px sans-serif'; ctx.fillStyle=rc;
    ctx.shadowColor=rc; ctx.shadowBlur=20;
    ctx.fillText(rank, W/2, 305);
    ctx.shadowBlur=0;
  } else {
    // サバイバル
    const survived = lives>0;
    ctx.font='bold 36px sans-serif';
    ctx.fillStyle=survived?'#FFD700':'#ff6677';
    ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=15;
    ctx.fillText(survived?'タイム終了！':'ゲームオーバー…', W/2, 95);
    ctx.shadowBlur=0;
    const m=Math.floor(survivalSec/60), s=survivalSec%60;
    const rows=[
      ['スコア',     `${score} 点`,                      '#ff99cc'],
      ['生存時間',   `${m}:${String(s).padStart(2,'0')}`, '#66ffaa'],
      ['到達WAVE',   `WAVE ${wave}`,                      '#FFD700'],
      ['倒した数',   `${defeated} 体`,                    '#88ccff'],
    ];
    rows.forEach(([label,val,color],i)=>{
      ctx.font='15px sans-serif'; ctx.fillStyle='#888';
      ctx.fillText(label, W/2-55, 155+i*48);
      ctx.font='bold 24px sans-serif'; ctx.fillStyle=color;
      ctx.shadowColor=color; ctx.shadowBlur=8;
      ctx.fillText(val, W/2+55, 155+i*48);
      ctx.shadowBlur=0;
    });
    // 残りライフ
    ctx.font='22px sans-serif';
    for (let i=0;i<MAX_LIVES;i++) {
      ctx.globalAlpha=i<lives?1:0.2;
      ctx.fillText('♥', W/2-MAX_LIVES*14+i*28, 360);
    }
    ctx.globalAlpha=1;
  }

  if (Math.sin(frame*0.08)>0) {
    ctx.font='bold 16px sans-serif'; ctx.fillStyle='#FFD700';
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=10;
    ctx.fillText('[ Space / Enter でタイトルへ ]', W/2, 415);
    ctx.shadowBlur=0;
  }
  ctx.textAlign='left';
}

// ── Main loop ─────────────────────────────────────────────
function loop() {
  update();
  if (mode==='title') { drawTitle(); }
  else if (mode==='result'||mode==='ending') { drawResult(); }
  else {
    drawBg(); drawPlatforms(); drawParticles();
    for (const e of enemies) drawEnemy(e);
    for (const p of projectiles) if(p.alive) drawProjectile(p);
    drawPlayer(); drawFloats(); drawHUD(); drawMenuButton();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
