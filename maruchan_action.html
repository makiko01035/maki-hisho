<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>まるちゃんアクション - まるちゃんワールド</title>
<style>
  body {
    margin: 0; background: #080818;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; font-family: sans-serif;
    overflow: hidden; user-select: none;
  }
  canvas { border: 3px solid #ff69b4; border-radius: 10px; box-shadow: 0 0 30px rgba(255,105,180,0.4); }
  #controls { color: #555; margin-top: 8px; font-size: 12px; }
</style>
</head>
<body>
<canvas id="game" width="800" height="450"></canvas>
<div id="controls">← → 移動 ｜ ↑ / W ジャンプ（2段） ｜ Z / Space フワフワ飛ぶ ｜ X 吸い込む / 能力発射</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 450, FLOOR = 378;
const GRAVITY = 0.38;

// ── Player ───────────────────────────────────────────────
const player = {
  x: 100, y: 300, w: 36, h: 36,
  vx: 0, vy: 0,
  onGround: false,
  floating: false, floatTimer: 0, maxFloat: 130,
  inhaling: false,
  puffed: false,
  ability: null,
  facing: 1,
  jumpCount: 0,
  invincible: 0,
  atkAnim: 0,
};

// ── Platforms ────────────────────────────────────────────
const platforms = [
  { x: 0,   y: FLOOR, w: 800, h: 72 },
  { x: 130, y: 290,   w: 110, h: 14 },
  { x: 340, y: 230,   w: 100, h: 14 },
  { x: 540, y: 265,   w: 120, h: 14 },
  { x: 650, y: 165,   w: 110, h: 14 },
  { x: 40,  y: 175,   w: 90,  h: 14 },
  { x: 260, y: 145,   w: 80,  h: 14 },
];

// ── Enemy types ───────────────────────────────────────────
const ETYPES = {
  waddle: { color:'#FF8C00', ability:null,    w:28, h:26, spd:0.8 },
  hothead:{ color:'#FF4500', ability:'fire',  w:30, h:30, spd:0.6 },
  chilly: { color:'#77CCEE', ability:'ice',   w:28, h:30, spd:0.5 },
  spark:  { color:'#FFD700', ability:'spark', w:26, h:26, spd:1.1 },
};

function abilityColor(ab) {
  if (ab==='fire')  return '#FF6633';
  if (ab==='ice')   return '#88DDFF';
  if (ab==='spark') return '#FFEE00';
  return '#ffffff';
}
function abilityName(ab) {
  if (ab==='fire')  return '🔥 ファイア';
  if (ab==='ice')   return '❄️ アイス';
  if (ab==='spark') return '⚡ スパーク';
  return '';
}

let enemies = [], projectiles = [], particles = [], stars = [];
let score = 0, spawnTimer = 0, frame = 0;
let missFlash = 0;

for (let i = 0; i < 60; i++)
  stars.push({ x: Math.random()*W, y: Math.random()*H*0.8, r: Math.random()*1.8+0.4, t: Math.random()*Math.PI*2 });

// ── Input ─────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;
  if (e.code==='ArrowUp' || e.code==='KeyW') {
    if (player.onGround || player.jumpCount < 2) {
      player.vy = -9.2;
      player.jumpCount++;
      player.floating = false;
      player.floatTimer = 0;
      addParticles(player.x+player.w/2, player.y+player.h, '#ffffff', 5, 0, -1);
    }
  }
  if (e.code==='KeyX') {
    if (player.ability) fireAbility();
    else { player.inhaling = true; player.puffed = true; }
  }
  e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code==='KeyX') { player.inhaling = false; player.puffed = false; }
});

// ── Helpers ───────────────────────────────────────────────
function addParticles(x, y, color, n=12, bvx=0, bvy=-2) {
  for (let i=0;i<n;i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*5 + bvx,
      vy: (Math.random()-0.5)*5 + bvy,
      life: 20+Math.random()*15, max: 35,
      color, r: 2+Math.random()*3,
    });
  }
}

function hitTest(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function fireAbility() {
  const ab = player.ability;
  player.ability = null;
  const px = player.facing>0 ? player.x+player.w+4 : player.x-4;
  projectiles.push({ x: px, y: player.y+player.h/2, vx: player.facing*9, vy: 0, ability: ab, alive: true });
  addParticles(px, player.y+player.h/2, abilityColor(ab), 10, player.facing*3, 0);
  player.atkAnim = 10;
}

function spawnEnemy() {
  const types = Object.keys(ETYPES);
  const type = types[Math.floor(Math.random()*types.length)];
  const d = ETYPES[type];
  const fromLeft = Math.random() < 0.5;
  enemies.push({
    x: fromLeft ? -50 : W+50,
    y: FLOOR - d.h,
    w: d.w, h: d.h,
    vx: (fromLeft?1:-1) * d.spd,
    type, ability: d.ability, color: d.color,
    alive: true, inhaled: false, inhaledProg: 0, walk: 0,
  });
}

// ── Physics ───────────────────────────────────────────────
function resolvePlatforms() {
  player.onGround = false;
  for (const p of platforms) {
    if (player.x+player.w <= p.x || player.x >= p.x+p.w) continue;
    if (player.vy >= 0 && player.y+player.h >= p.y && player.y+player.h <= p.y+p.h+12) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
      player.jumpCount = 0;
      player.floating = false;
      player.floatTimer = 0;
    } else if (player.vy < 0 && player.y <= p.y+p.h && player.y >= p.y) {
      player.y = p.y + p.h;
      player.vy = 0;
    }
  }
}

// ── Update ────────────────────────────────────────────────
function update() {
  frame++;
  for (const s of stars) s.t += 0.035;

  // Move
  if (keys['ArrowLeft']||keys['KeyA']) { player.vx=-3.8; player.facing=-1; }
  else if (keys['ArrowRight']||keys['KeyD']) { player.vx=3.8; player.facing=1; }
  else { player.vx *= 0.8; }

  // Float
  if ((keys['Space']||keys['KeyZ']) && !player.onGround && player.floatTimer < player.maxFloat) {
    player.floating = true;
    player.vy = player.vy < 0 ? player.vy*0.9 : -0.8;
    player.floatTimer++;
    if (frame%8===0) addParticles(player.x+player.w/2, player.y+player.h, '#ffaaee', 2, 0, 1);
  } else {
    player.floating = false;
  }

  if (!player.floating) player.vy += GRAVITY;
  player.vy = Math.min(player.vy, 16);
  player.x += player.vx;
  player.y += player.vy;

  if (player.x > W) player.x = -player.w;
  if (player.x+player.w < 0) player.x = W;
  if (player.y > H+50) { player.y = 50; player.vy = 0; }

  resolvePlatforms();
  if (player.invincible>0) player.invincible--;
  if (player.atkAnim>0)    player.atkAnim--;

  // Inhale
  if (player.inhaling) {
    const iRect = {
      x: player.facing>0 ? player.x+player.w : player.x-90,
      y: player.y-15, w: 90, h: player.h+30,
    };
    for (const e of enemies) {
      if (e.alive && !e.inhaled && hitTest(e, iRect)) e.inhaled = true;
    }
  }

  // Pull inhaled enemies toward player
  for (const e of enemies) {
    if (!e.inhaled) continue;
    e.inhaledProg += 0.1;
    e.x += (player.x+player.w/2 - e.x)*0.18;
    e.y += (player.y+player.h/2 - e.y)*0.18;
    if (e.inhaledProg >= 1) {
      if (e.ability && !player.ability) {
        player.ability = e.ability;
        addParticles(player.x+player.w/2, player.y, abilityColor(e.ability), 15, 0, -3);
      }
      score += 100;
      e.alive = false;
    }
  }

  // Enemy AI
  for (const e of enemies) {
    if (!e.alive || e.inhaled) continue;
    e.walk++;
    e.x += e.vx;
    if (e.x < -60 || e.x > W+60) e.vx *= -1;
    e.y = FLOOR - e.h;

    // Hit player
    if (player.invincible===0 && hitTest(player, e)) {
      player.invincible = 80;
      player.vy = -6;
      player.ability = null;
      missFlash = 15;
      addParticles(player.x+player.w/2, player.y+player.h/2, '#ff6699', 8, 0, -2);
    }
  }

  // Projectiles
  for (const proj of projectiles) {
    if (!proj.alive) continue;
    proj.x += proj.vx; proj.y += proj.vy;
    if (proj.x<-30||proj.x>W+30||proj.y<-30||proj.y>H+30) { proj.alive=false; continue; }
    for (const e of enemies) {
      if (!e.alive||e.inhaled) continue;
      if (proj.x>e.x&&proj.x<e.x+e.w&&proj.y>e.y&&proj.y<e.y+e.h) {
        proj.alive=false; e.alive=false; score+=200;
        addParticles(e.x+e.w/2, e.y+e.h/2, abilityColor(proj.ability), 14, 0, -2);
        break;
      }
    }
  }

  for (const p of particles) { p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life--; }
  enemies     = enemies.filter(e=>e.alive);
  projectiles = projectiles.filter(p=>p.alive);
  particles   = particles.filter(p=>p.life>0);
  if (missFlash>0) missFlash--;

  spawnTimer++;
  if (spawnTimer>180 && enemies.length<6) { spawnEnemy(); spawnTimer=0; }
}

// ── Draw ──────────────────────────────────────────────────
function drawBg() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#060614'); g.addColorStop(1,'#121244');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for (const s of stars) {
    ctx.fillStyle=`rgba(255,255,255,${0.3+0.7*Math.abs(Math.sin(s.t))})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  // 雲
  [[150,75,70,28],[490,55,90,32],[710,95,55,22]].forEach(([cx,cy,rw,rh])=>{
    ctx.fillStyle='rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.ellipse(cx,cy,rw,rh,0,0,Math.PI*2); ctx.fill();
  });
  if (missFlash>0) {
    ctx.fillStyle=`rgba(255,0,60,${missFlash/15*0.2})`; ctx.fillRect(0,0,W,H);
  }
}

function drawPlatforms() {
  for (const p of platforms) {
    const g = ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
    if (p.h>30) {
      g.addColorStop(0,'#4e8a5a'); g.addColorStop(0.15,'#3a6644');
      g.addColorStop(0.16,'#2d4a30'); g.addColorStop(1,'#1a2e1c');
    } else {
      g.addColorStop(0,'#6ab24e'); g.addColorStop(1,'#3d7a4a');
    }
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,p.h,p.h>30?0:7); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(p.x,p.y,p.w,3);
  }
}

function drawPlayer() {
  const cx=player.x+player.w/2, cy=player.y+player.h/2;
  const rx=player.w/2*(player.puffed?1.28:1);
  const ry=player.h/2*(player.puffed?1.18:1);
  const hurt=player.invincible>0&&Math.floor(player.invincible/6)%2===1;
  if (hurt) ctx.globalAlpha=0.45;

  // 影
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(cx,FLOOR+4,rx*0.75,5,0,0,Math.PI*2); ctx.fill();

  // 体
  const bodyColor = player.ability ? abilityColor(player.ability) : '#FF69B4';
  ctx.fillStyle=bodyColor;
  ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.fill();

  // ハイライト
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.ellipse(cx-rx*0.2,cy-ry*0.3,rx*0.45,ry*0.3,-0.3,0,Math.PI*2); ctx.fill();

  // ほっぺ
  ctx.fillStyle='rgba(255,80,120,0.45)';
  ctx.beginPath(); ctx.ellipse(cx-rx*0.48,cy+ry*0.12,rx*0.2,ry*0.16,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+rx*0.48,cy+ry*0.12,rx*0.2,ry*0.16,0,0,Math.PI*2); ctx.fill();

  // 目
  const eo=player.facing*rx*0.12;
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(cx-rx*0.26+eo,cy-ry*0.06,rx*0.1,ry*0.14,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+rx*0.26+eo,cy-ry*0.06,rx*0.1,ry*0.14,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(cx-rx*0.22+eo,cy-ry*0.11,rx*0.04,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+rx*0.30+eo,cy-ry*0.11,rx*0.04,0,Math.PI*2); ctx.fill();

  // 足
  const step=Math.sin(frame*0.15)*2;
  ctx.fillStyle='#cc2266';
  ctx.beginPath(); ctx.ellipse(cx-rx*0.42,player.y+player.h*0.9+step,rx*0.2,ry*0.14,-0.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+rx*0.42,player.y+player.h*0.9-step,rx*0.2,ry*0.14, 0.2,0,Math.PI*2); ctx.fill();

  // 腕
  const arm=Math.sin(frame*0.2)*0.4;
  ctx.fillStyle=bodyColor;
  ctx.beginPath(); ctx.ellipse(cx-rx*0.82,cy+ry*0.1+arm*8,rx*0.24,ry*0.2,-0.5+arm,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+rx*0.82,cy+ry*0.1-arm*8,rx*0.24,ry*0.2, 0.5-arm,0,Math.PI*2); ctx.fill();

  // 吸い込みエフェクト
  if (player.inhaling) {
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
    for (let i=1;i<=4;i++) {
      const d=i*20;
      const bx=player.facing>0 ? cx+rx+d*0.4 : cx-rx-d*0.4;
      ctx.beginPath();
      ctx.arc(bx,cy,d*0.35,
        player.facing>0?-Math.PI*0.55:Math.PI*0.45,
        player.facing>0? Math.PI*0.55:Math.PI*1.55);
      ctx.stroke();
    }
  }

  // フワフワ
  if (player.floating) {
    ctx.fillStyle='rgba(255,200,255,0.1)';
    ctx.beginPath(); ctx.ellipse(cx,cy,rx*1.6,ry*1.6,0,0,Math.PI*2); ctx.fill();
  }

  // 攻撃エフェクト
  if (player.atkAnim>0) {
    const a=player.atkAnim/10;
    ctx.strokeStyle=`rgba(255,255,100,${a})`; ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(cx+player.facing*(rx+5),cy);
    ctx.lineTo(cx+player.facing*(rx+5+a*110),cy);
    ctx.stroke();
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=12;
    ctx.fillStyle=`rgba(255,220,0,${a})`;
    ctx.beginPath(); ctx.arc(cx+player.facing*(rx+5+a*110),cy,7,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  ctx.globalAlpha=1;
}

function drawEnemy(e) {
  const cx=e.x+e.w/2, cy=e.y+e.h/2;
  const bob=Math.sin(e.walk*0.18)*2.5;
  const alpha=e.inhaled?1-e.inhaledProg:1;
  ctx.globalAlpha=alpha;

  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(cx,FLOOR+3,12,4,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle=e.color;
  ctx.beginPath(); ctx.ellipse(cx,cy+bob,e.w/2,e.h/2,0,0,Math.PI*2); ctx.fill();

  const fd=e.vx>0?0.08:-0.08;
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.ellipse(cx-e.w*0.2+fd*e.w,cy-e.h*0.05+bob,e.w*0.1,e.h*0.13,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+e.w*0.2+fd*e.w,cy-e.h*0.05+bob,e.w*0.1,e.h*0.13,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(cx-e.w*0.14+fd*e.w,cy-e.h*0.1+bob,e.w*0.04,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+e.w*0.24+fd*e.w,cy-e.h*0.1+bob,e.w*0.04,0,Math.PI*2); ctx.fill();

  const step=Math.sin(e.walk*0.22)*4;
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(cx-e.w*0.3,e.y+e.h-2+step,e.w*0.17,e.h*0.11,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+e.w*0.3,e.y+e.h-2-step,e.w*0.17,e.h*0.11,0,0,Math.PI*2); ctx.fill();

  if (e.type==='hothead') {
    ctx.fillStyle='#FF6600';
    [-3,0,3].forEach((ox,i)=>{ ctx.beginPath(); ctx.arc(cx+ox,e.y-e.h/2-4+bob+Math.sin(frame*0.1+i)*2,4,0,Math.PI*2); ctx.fill(); });
  } else if (e.type==='chilly') {
    ctx.fillStyle='#C0EEFF'; ctx.beginPath(); ctx.roundRect(cx-9,e.y-e.h/2-8+bob,18,9,3); ctx.fill();
    ctx.fillStyle='white'; [-5,0,5].forEach(ox=>ctx.fillRect(cx+ox,e.y-e.h/2-7+bob,2,5));
  } else if (e.type==='spark') {
    ctx.strokeStyle=`rgba(255,220,0,${0.4+0.4*Math.sin(frame*0.15)})`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy+bob,e.w/2+5,0,Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function drawProjectile(proj) {
  const c=abilityColor(proj.ability);
  ctx.shadowColor=c; ctx.shadowBlur=15;
  ctx.fillStyle=c;
  if (proj.ability==='fire') {
    ctx.beginPath(); ctx.ellipse(proj.x,proj.y,13,8,Math.atan2(proj.vy,proj.vx),0,Math.PI*2); ctx.fill();
  } else if (proj.ability==='ice') {
    ctx.save(); ctx.translate(proj.x,proj.y); ctx.rotate(frame*0.08);
    for (let i=0;i<6;i++) { ctx.rotate(Math.PI/3); ctx.fillRect(-2,-10,4,20); }
    ctx.restore();
  } else {
    for (let i=0;i<5;i++) {
      const a=(i/5)*Math.PI*2+frame*0.15;
      ctx.beginPath(); ctx.arc(proj.x+Math.cos(a)*5,proj.y+Math.sin(a)*5,5,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.fill();
  ctx.shadowBlur=0;
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha=p.life/p.max;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(p.life/p.max),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawHUD() {
  ctx.font='bold 20px sans-serif'; ctx.fillStyle='#fff';
  ctx.shadowColor='#ff69b4'; ctx.shadowBlur=8;
  ctx.fillText(`★ ${score}`, 16, 34);
  ctx.shadowBlur=0;

  if (player.ability) {
    const c=abilityColor(player.ability);
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.roundRect(10,44,136,26,7); ctx.fill();
    ctx.font='15px sans-serif'; ctx.fillStyle=c;
    ctx.shadowColor=c; ctx.shadowBlur=10;
    ctx.fillText(abilityName(player.ability),18,62);
    ctx.shadowBlur=0;
  }

  if (enemies.length===0) {
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='14px sans-serif';
    ctx.textAlign='center'; ctx.fillText('まもなく敵が来るよ…', W/2, 190);
    ctx.textAlign='left';
  }
}

// ── Main loop ─────────────────────────────────────────────
spawnEnemy(); spawnEnemy();

function loop() {
  update();
  drawBg();
  drawPlatforms();
  drawParticles();
  for (const e of enemies) drawEnemy(e);
  for (const p of projectiles) if(p.alive) drawProjectile(p);
  drawPlayer();
  drawHUD();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
