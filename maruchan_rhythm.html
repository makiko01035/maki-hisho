<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>まるちゃんリズムステージ - まるちゃんワールド</title>
<style>
  body {
    margin: 0; background: #080818;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; font-family: sans-serif;
    overflow: hidden; user-select: none;
  }
  canvas { border: 3px solid #a78bfa; border-radius: 10px; box-shadow: 0 0 30px rgba(167,139,250,0.4); }
  #controls { color: #555; margin-top: 8px; font-size: 12px; }
</style>
</head>
<body>
<canvas id="game" width="480" height="600"></canvas>
<div id="controls">← ↓ ↑ → キーでノーツをたたこう ｜ M でBGM ON/OFF ｜ ESC でタイトルへ</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 480, H = 600;

// ── Audio ──────────────────────────────────────────────
let audioCtx = null;
const BPM = 138, N = 60 / BPM / 2;
let bgmOn = true, bgmIdx = 0, bassIdx = 0, bgmNext = 0, bassNext = 0;

const F = {
  C3:131,D3:147,E3:165,F3:175,G3:196,A3:220,B3:247,
  C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,
  C5:523,D5:587,E5:659,F5:698,G5:784,A5:880,B5:988,C6:1047,R:0,
};
const MELODY = [
  [F.G5,2],[F.E5,2],[F.G5,2],[F.A5,2],[F.G5,4],[F.E5,2],[F.D5,2],
  [F.E5,2],[F.G5,2],[F.E5,2],[F.C5,2],[F.D5,4],[F.R,4],
  [F.A5,2],[F.G5,2],[F.E5,2],[F.G5,2],[F.A5,4],[F.G5,2],[F.E5,2],
  [F.D5,2],[F.E5,2],[F.G5,2],[F.E5,2],[F.C5,8],
];
const BASS = [
  [F.C3,4],[F.G3,4],[F.A3,4],[F.E3,4],
  [F.F3,4],[F.C3,4],[F.G3,4],[F.D3,4],
  [F.A3,4],[F.E3,4],[F.F3,4],[F.C3,4],
  [F.G3,4],[F.D3,4],[F.C3,4],[F.G3,4],
];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  bgmNext = audioCtx.currentTime + 0.05;
  bassNext = audioCtx.currentTime + 0.05;
}

function playNote(freq, start, dur, type, vol) {
  if (!audioCtx || freq === 0) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, start);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + dur * 0.85);
  osc.start(start); osc.stop(start + dur);
}

function scheduleBGM() {
  if (!audioCtx || !bgmOn) return;
  const ahead = 0.2;
  while (bgmNext < audioCtx.currentTime + ahead) {
    const [freq, len] = MELODY[bgmIdx % MELODY.length];
    playNote(freq, bgmNext, N * len * 0.88, 'square', 0.05);
    bgmNext += N * len; bgmIdx++;
  }
  while (bassNext < audioCtx.currentTime + ahead) {
    const [freq, len] = BASS[bassIdx % BASS.length];
    playNote(freq, bassNext, N * len * 0.7, 'triangle', 0.07);
    bassNext += N * len; bassIdx++;
  }
}

function playSE(freq, dur, type = 'sine', vol = 0.15) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}

// ── ゲーム定数 ──────────────────────────────────────────
const LANES = 4;
const LANE_W = 90;
const OFFSET_X = (W - LANE_W * LANES) / 2;
const HIT_Y = H - 80;
const JUDGE_Y = { perfect: 35, good: 65 };
const NOTE_SPEED = 5;
const NOTE_R = 22;
const COLORS = ['#f87171','#fb923c','#34d399','#60a5fa'];
const KEYS = ['ArrowLeft','ArrowDown','ArrowUp','ArrowRight'];
const LABELS = ['←','↓','↑','→'];
const BPM_SEC = 60 / BPM;
const NOTES_PER_BEAT = 2;

// ── 状態 ────────────────────────────────────────────────
let scene = 'title'; // title | play | result
let notes = [], score = 0, combo = 0, maxCombo = 0;
let totalNotes = 0, perfectCount = 0, goodCount = 0, missCount = 0;
let effects = [];
let keyFlash = [0,0,0,0];
let maru = { y: HIT_Y - 60, jump: 0, bobT: 0 };
let gameTime = 0, gameDuration = 60;
let lastNoteTime = 0;
let notePattern = [];
let patternIdx = 0;
let bgColor = 0;

function buildPattern() {
  // リズムパターン（0〜3のレーン番号、-1は休符）
  const base = [
    0,-1,2,-1,1,-1,3,-1,
    0,2,-1,1,0,-1,3,-1,
    1,3,0,-1,2,1,-1,3,
    0,-1,0,2,1,-1,3,-1,
    2,-1,1,3,0,2,-1,1,
    0,3,-1,2,1,-1,0,3,
  ];
  notePattern = base;
}

function spawnNote() {
  if (patternIdx >= notePattern.length) patternIdx = 0;
  const lane = notePattern[patternIdx++];
  if (lane >= 0) {
    notes.push({ lane, y: -NOTE_R, hit: false });
    totalNotes++;
  }
}

function laneX(lane) {
  return OFFSET_X + lane * LANE_W + LANE_W / 2;
}

function resetGame() {
  notes = []; score = 0; combo = 0; maxCombo = 0;
  totalNotes = 0; perfectCount = 0; goodCount = 0; missCount = 0;
  effects = []; keyFlash = [0,0,0,0];
  gameTime = 0; lastNoteTime = 0; patternIdx = 0;
  bgColor = 0;
  buildPattern();
  maru.y = HIT_Y - 60; maru.jump = 0; maru.bobT = 0;
  bgmIdx = 0; bassIdx = 0;
  if (audioCtx) {
    bgmNext = audioCtx.currentTime + 0.05;
    bassNext = audioCtx.currentTime + 0.05;
  }
}

// ── 入力 ────────────────────────────────────────────────
const keyDown = new Set();
window.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.key === 'Escape') {
    if (scene === 'play' || scene === 'result') { scene = 'title'; return; }
  }
  if (e.key === 'm' || e.key === 'M') {
    bgmOn = !bgmOn;
    if (bgmOn && audioCtx) {
      bgmNext = audioCtx.currentTime + 0.05;
      bassNext = audioCtx.currentTime + 0.05;
    }
    return;
  }
  if (scene === 'title') {
    if (e.key === ' ' || e.key === 'Enter' || KEYS.includes(e.key)) {
      initAudio();
      resetGame();
      scene = 'play';
    }
    return;
  }
  if (scene === 'result') {
    if (e.key === ' ' || e.key === 'Enter') {
      initAudio();
      resetGame();
      scene = 'play';
    }
    return;
  }
  if (scene === 'play') {
    const li = KEYS.indexOf(e.key);
    if (li >= 0) {
      keyFlash[li] = 8;
      judgeHit(li);
    }
  }
});

function judgeHit(lane) {
  let best = null, bestDist = 9999;
  for (const n of notes) {
    if (n.lane !== lane || n.hit) continue;
    const dist = Math.abs(n.y - HIT_Y);
    if (dist < bestDist) { bestDist = dist; best = n; }
  }
  if (!best) return;
  if (bestDist <= JUDGE_Y.perfect) {
    best.hit = true; perfectCount++;
    addEffect(lane, 'PERFECT', '#facc15');
    playSE(880, 0.12, 'sine', 0.18);
    score += 300 + combo * 10;
    combo++;
    maru.jump = -12;
  } else if (bestDist <= JUDGE_Y.good) {
    best.hit = true; goodCount++;
    addEffect(lane, 'GOOD', '#34d399');
    playSE(660, 0.1, 'sine', 0.14);
    score += 100;
    combo++;
  } else {
    addEffect(lane, 'MISS', '#f87171');
    playSE(200, 0.08, 'sawtooth', 0.1);
    combo = 0;
  }
  maxCombo = Math.max(maxCombo, combo);
}

function addEffect(lane, text, color) {
  effects.push({ x: laneX(lane), y: HIT_Y - 30, text, color, life: 40 });
}

// ── 更新 ────────────────────────────────────────────────
function update(dt) {
  if (scene !== 'play') return;

  gameTime += dt;
  if (gameTime >= gameDuration) { scene = 'result'; return; }

  // ノーツ生成
  const interval = BPM_SEC / NOTES_PER_BEAT;
  if (gameTime - lastNoteTime >= interval) {
    spawnNote();
    lastNoteTime = gameTime;
  }

  // ノーツ移動
  for (const n of notes) { n.y += NOTE_SPEED; }

  // ミス判定（通り過ぎた）
  for (const n of notes) {
    if (!n.hit && n.y > HIT_Y + NOTE_R + 10) {
      n.hit = true; missCount++;
      addEffect(n.lane, 'MISS', '#f87171');
      playSE(150, 0.08, 'sawtooth', 0.08);
      combo = 0;
    }
  }

  // 古いノーツ削除
  notes = notes.filter(n => !(n.hit && n.y > HIT_Y + 60));

  // エフェクト更新
  effects.forEach(e => { e.life--; e.y -= 1; });
  effects = effects.filter(e => e.life > 0);

  // まるちゃん
  maru.bobT += 0.08;
  maru.jump += 0.7;
  maru.y += maru.jump;
  if (maru.y >= HIT_Y - 60) { maru.y = HIT_Y - 60; maru.jump = 0; }

  // キーフラッシュ減衰
  keyFlash = keyFlash.map(v => Math.max(0, v - 1));

  // BGM
  scheduleBGM();

  // 背景色変化
  bgColor = (bgColor + 0.3) % 360;
}

// ── 描画 ────────────────────────────────────────────────
function drawTitle() {
  // 背景
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, W, H);

  // タイトルグロー
  ctx.save();
  ctx.shadowColor = '#a78bfa';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('まるちゃん', W/2, 180);
  ctx.fillStyle = '#a78bfa';
  ctx.font = 'bold 48px sans-serif';
  ctx.fillText('リズムステージ', W/2, 235);
  ctx.restore();

  // まるちゃん
  drawMaru(W/2, 310, 38, Math.sin(Date.now()/300)*5);

  ctx.fillStyle = '#888';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('スペース / Enter / 矢印キー でスタート', W/2, 390);
  ctx.fillText('← ↓ ↑ → キーでノーツをたたこう', W/2, 420);
  ctx.fillStyle = '#555';
  ctx.font = '13px sans-serif';
  ctx.fillText('制作：まるちゃんワールド', W/2, 460);

  // 戻るボタン
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  roundRect(ctx, W/2-60, H-60, 120, 36, 10);
  ctx.fill();
  ctx.fillStyle = '#888';
  ctx.font = '14px sans-serif';
  ctx.fillText('← もどる', W/2, H-36);
}

function drawPlay() {
  // 背景
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, W, H);

  // レーン背景
  for (let i = 0; i < LANES; i++) {
    const x = OFFSET_X + i * LANE_W;
    ctx.fillStyle = keyFlash[i] > 0 ? `rgba(${hexToRgb(COLORS[i])},0.15)` : 'rgba(255,255,255,0.03)';
    ctx.fillRect(x, 0, LANE_W, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.moveTo(OFFSET_X + LANES * LANE_W, 0); ctx.lineTo(OFFSET_X + LANES * LANE_W, H); ctx.stroke();

  // ヒットライン
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(OFFSET_X, HIT_Y); ctx.lineTo(OFFSET_X + LANES * LANE_W, HIT_Y); ctx.stroke();

  // ヒットサークル
  for (let i = 0; i < LANES; i++) {
    const x = laneX(i);
    ctx.beginPath();
    ctx.arc(x, HIT_Y, NOTE_R + 4, 0, Math.PI * 2);
    ctx.strokeStyle = keyFlash[i] > 0 ? COLORS[i] : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = keyFlash[i] > 0 ? 3 : 1.5;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fill();

    // キーラベル
    ctx.fillStyle = keyFlash[i] > 0 ? COLORS[i] : '#555';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(LABELS[i], x, HIT_Y + 5);
  }

  // ノーツ
  for (const n of notes) {
    if (n.hit) continue;
    const x = laneX(n.lane);
    ctx.save();
    ctx.shadowColor = COLORS[n.lane];
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(x, n.y, NOTE_R, 0, Math.PI * 2);
    ctx.fillStyle = COLORS[n.lane];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  // まるちゃん（レーン左側）
  drawMaru(OFFSET_X - 40, maru.y, 28, 0);

  // エフェクト
  for (const e of effects) {
    ctx.globalAlpha = e.life / 40;
    ctx.fillStyle = e.color;
    ctx.font = `bold ${e.text === 'PERFECT' ? 20 : 16}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(e.text, e.x, e.y);
    ctx.globalAlpha = 1;
  }

  // UI上部
  const timeLeft = Math.max(0, gameDuration - gameTime);
  const barW = LANES * LANE_W;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(OFFSET_X, 0, barW, 52);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`${score}`, OFFSET_X + 8, 30);

  ctx.textAlign = 'center';
  ctx.fillStyle = combo >= 10 ? '#facc15' : '#fff';
  ctx.font = 'bold 18px sans-serif';
  ctx.fillText(combo > 0 ? `${combo} combo` : '', OFFSET_X + barW/2, 30);

  ctx.textAlign = 'right';
  ctx.fillStyle = timeLeft <= 10 ? '#f87171' : '#aaa';
  ctx.font = '18px sans-serif';
  ctx.fillText(`${Math.ceil(timeLeft)}秒`, OFFSET_X + barW - 8, 30);

  // タイムバー
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(OFFSET_X, 44, barW, 5);
  const pct = 1 - gameTime / gameDuration;
  ctx.fillStyle = timeLeft <= 10 ? '#f87171' : '#a78bfa';
  ctx.fillRect(OFFSET_X, 44, barW * pct, 5);
}

function drawResult() {
  ctx.fillStyle = '#080818';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.shadowColor = '#a78bfa';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#a78bfa';
  ctx.font = 'bold 42px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('RESULT', W/2, 90);
  ctx.restore();

  // ランク
  const pct = totalNotes > 0 ? perfectCount / totalNotes : 0;
  let rank = 'C', rColor = '#888';
  if (pct >= 0.95) { rank = 'S'; rColor = '#facc15'; }
  else if (pct >= 0.8) { rank = 'A'; rColor = '#34d399'; }
  else if (pct >= 0.6) { rank = 'B'; rColor = '#60a5fa'; }

  ctx.save();
  ctx.shadowColor = rColor;
  ctx.shadowBlur = 30;
  ctx.fillStyle = rColor;
  ctx.font = 'bold 80px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(rank, W/2, 200);
  ctx.restore();

  // まるちゃん
  drawMaru(W/2, 270, 34, rank === 'S' ? Math.sin(Date.now()/200)*8 : 0);

  // スコア詳細
  const rows = [
    [`スコア`, `${score}`, '#fff'],
    [`PERFECT`, `${perfectCount}`, '#facc15'],
    [`GOOD`, `${goodCount}`, '#34d399'],
    [`MISS`, `${missCount}`, '#f87171'],
    [`MAX COMBO`, `${maxCombo}`, '#a78bfa'],
  ];
  let ry = 330;
  for (const [label, val, color] of rows) {
    ctx.fillStyle = '#333';
    ctx.fillRect(OFFSET_X + 10, ry - 20, LANES * LANE_W - 20, 28);
    ctx.fillStyle = '#888';
    ctx.font = '15px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(label, OFFSET_X + 22, ry);
    ctx.fillStyle = color;
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(val, OFFSET_X + LANES * LANE_W - 22, ry);
    ry += 34;
  }

  ctx.fillStyle = '#a78bfa';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('スペース / Enter でもう一度', W/2, H - 50);
  ctx.fillStyle = '#444';
  ctx.font = '13px sans-serif';
  ctx.fillText('ESC でタイトルへ', W/2, H - 28);
}

function drawMaru(x, y, r, wobble) {
  ctx.save();
  ctx.translate(x + wobble, y);
  // 体
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = '#f9a8d4';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();
  // 目
  ctx.fillStyle = '#1e1b4b';
  ctx.beginPath(); ctx.arc(-r*0.3, -r*0.1, r*0.15, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( r*0.3, -r*0.1, r*0.15, 0, Math.PI*2); ctx.fill();
  // 口
  ctx.strokeStyle = '#1e1b4b'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, r*0.1, r*0.25, 0.1, Math.PI - 0.1);
  ctx.stroke();
  ctx.restore();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// タイトル画面の戻るボタン
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (W / rect.width);
  const cy = (e.clientY - rect.top) * (H / rect.height);
  if (scene === 'title') {
    if (cx >= W/2-60 && cx <= W/2+60 && cy >= H-60 && cy <= H-24) {
      window.location.href = '/';
    }
  }
});

// ── メインループ ─────────────────────────────────────────
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  if (scene === 'play') update(dt);
  else if (scene === 'title') scheduleBGM();

  if (scene === 'title') drawTitle();
  else if (scene === 'play') drawPlay();
  else if (scene === 'result') drawResult();

  requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { last = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
